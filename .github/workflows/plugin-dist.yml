name: Build and deploy plugin-dist

on:
  push:
    branches: [main]
    paths:
      - "hindsight-integrations/opencode/**"
      - ".github/workflows/plugin-dist.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build plugin
        working-directory: hindsight-integrations/opencode
        run: |
          npm install
          npm run build

      - name: Prepare plugin-dist branch
        run: |
          git checkout plugin-dist || git checkout --orphan plugin-dist
          git reset --hard origin/plugin-dist 2>/dev/null || true

          # Copy built files from the main checkout
          # plugin-dist already has the source at root (from subtree split),
          # we just need to add the dist/ folder
          cp -r hindsight-integrations/opencode/dist ./dist
          cp hindsight-integrations/opencode/package.json ./package.json
          cp hindsight-integrations/opencode/README.md ./README.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist package.json README.md
          git diff --staged --quiet && echo "No changes to deploy" && exit 0
          git commit -m "deploy: plugin-dist build from $(git rev-parse --short main)"
          git push origin plugin-dist --force
