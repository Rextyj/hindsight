name: Build and deploy plugin-dist

on:
  push:
    branches: [main]
    paths:
      - "hindsight-integrations/opencode/**"
      - ".github/workflows/plugin-dist.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build plugin
        working-directory: hindsight-integrations/opencode
        run: |
          npm install
          npm run build

      - name: Deploy to plugin-dist branch
        run: |
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Save the built dist/ and key files from main
          mkdir -p /tmp/plugin-deploy
          cp -r hindsight-integrations/opencode/dist /tmp/plugin-deploy/dist
          cp hindsight-integrations/opencode/package.json /tmp/plugin-deploy/package.json
          cp hindsight-integrations/opencode/README.md /tmp/plugin-deploy/README.md

          # Switch to plugin-dist branch
          git checkout plugin-dist
          git pull origin plugin-dist

          # Replace dist/ and key files with freshly built versions
          rm -rf dist
          cp -r /tmp/plugin-deploy/dist ./dist
          cp /tmp/plugin-deploy/package.json ./package.json
          cp /tmp/plugin-deploy/README.md ./README.md

          # Commit and push if there are changes
          git add dist package.json README.md
          if git diff --staged --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "deploy: plugin-dist build from $(git rev-parse --short HEAD~0)"
            git push origin plugin-dist
          fi

          # Cleanup
          rm -rf /tmp/plugin-deploy
